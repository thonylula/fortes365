<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORTE 365 — Luanthony & Jéssica</title>
<meta name="theme-color" content="#FF5500">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0b0b;--s1:#141414;--s2:#1c1c1c;--s3:#252525;--bd:#2e2e2e;--or:#FF5500;--ord:rgba(255,85,0,.13);--pk:#EC4899;--pkd:rgba(236,72,153,.12);--gn:#22C55E;--gnd:rgba(34,197,94,.12);--bl:#3B82F6;--bld:rgba(59,130,246,.12);--yw:#EAB308;--ywd:rgba(234,179,8,.12);--rd:#EF4444;--pu:#a855f7;--pud:rgba(168,85,247,.12);--tx:#f0f0f0;--tx2:#999;--tx3:#555;--r:12px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200}
.logo{font-family:'Anton',sans-serif;font-size:22px;letter-spacing:3px;color:var(--or)}
.logo span{color:var(--tx)}.logo sub{font-size:10px;color:var(--tx3);letter-spacing:1px;font-family:'Barlow',sans-serif;font-weight:600;margin-left:4px}
.prow{display:flex;gap:5px}
.pmini{display:flex;align-items:center;gap:5px;border-radius:6px;padding:4px 8px;border:1.5px solid}
.pl{border-color:var(--or);background:var(--ord)}.pj{border-color:var(--pk);background:var(--pkd)}
.pav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:9px}
.avl{background:var(--ord);color:var(--or)}.avj{background:var(--pkd);color:var(--pk)}
.pmn{font-size:11px;font-weight:600}
.nav-tabs{background:var(--s1);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto}
.nav-tab{flex:1;min-width:56px;padding:9px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;background:none;border-top:none;border-left:none;border-right:none;color:var(--tx2);font-family:'Barlow',sans-serif}
.nav-tab:hover{color:var(--tx);background:var(--s2)}.nav-tab.active{border-bottom-color:var(--or);color:var(--tx)}
.nav-icon{font-size:14px}.nav-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:600}
.mstrip{background:var(--s2);border-bottom:1px solid var(--bd);padding:.5rem .8rem;overflow-x:auto}
.mbtns{display:flex;gap:5px;min-width:max-content}
.mbtn{padding:4px 9px;border:1.5px solid var(--bd);border-radius:5px;background:var(--s3);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;color:var(--tx2);letter-spacing:.5px;transition:.2s}
.mbtn:hover{border-color:var(--or);color:var(--tx)}.mbtn.active{border-color:var(--or);background:var(--ord);color:var(--or)}
.wstrip{background:var(--bg);border-bottom:1px solid var(--bd);padding:.5rem .8rem;display:flex;align-items:center;gap:.7rem;overflow-x:auto}
.wlbl{font-size:10px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;flex-shrink:0}
.wbtns{display:flex;gap:5px;flex-shrink:0}
.wbtn{padding:4px 9px;border:1.5px solid var(--bd);border-radius:5px;background:var(--s2);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;color:var(--tx2);letter-spacing:.5px;transition:.2s}
.wbtn:hover{border-color:var(--or);color:var(--tx)}.wbtn.active{border-color:var(--or);background:var(--ord);color:var(--or)}
.pchip{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:3px;flex-shrink:0}
.phv{background:var(--gnd);color:var(--gn)}.pha{background:var(--ywd);color:var(--yw)}.pho{background:var(--ord);color:var(--or)}.phr{background:rgba(239,68,68,.15);color:var(--rd)}.php{background:var(--pud);color:var(--pu)}
.dstrip{background:var(--s1);border-bottom:1px solid var(--bd);padding:.5rem .8rem;overflow-x:auto}
.dbtns{display:flex;gap:5px;min-width:max-content}
.dbtn{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--s2);border:1.5px solid var(--bd);border-radius:7px;padding:6px 11px;cursor:pointer;transition:.2s;min-width:52px}
.dbtn:hover{border-color:var(--or)}.dbtn.active{background:var(--or);border-color:var(--or)}
.dbtn.active .da{color:#fff}.dbtn.active .dn{color:rgba(255,255,255,.7)}
.da{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;color:var(--tx)}.dn{font-size:9px;color:var(--tx2)}
.main{flex:1;max-width:1100px;margin:0 auto;width:100%;padding:1rem .8rem 4rem}
.slbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);margin-bottom:.7rem;display:flex;align-items:center;gap:6px}
.slbl::after{content:'';flex:1;height:1px;background:var(--bd)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
@media(max-width:820px){.two-col{grid-template-columns:1fr}}
/* COVER PHOTO */
.cover-wrap{border-radius:var(--r);overflow:hidden;margin-bottom:1rem;position:relative;height:180px;background:linear-gradient(135deg,var(--s2),var(--s3))}
.cover-img{width:100%;height:100%;object-fit:cover;display:block}
.cover-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.2) 60%,transparent 100%)}
.cover-content{position:absolute;bottom:0;left:0;right:0;padding:.9rem 1rem}
.cover-title{font-family:'Anton',sans-serif;font-size:24px;letter-spacing:2px;line-height:1;margin-bottom:3px}
.cover-sub{font-size:12px;color:rgba(255,255,255,.75)}
.cover-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.ctag{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.5px;padding:2px 7px;border-radius:3px;text-transform:uppercase}
.ct-or{background:var(--or);color:#fff}.ct-gn{background:var(--gn);color:#000}.ct-bl{background:var(--bl);color:#fff}.ct-yw{background:rgba(234,179,8,.9);color:#000}.ct-pk{background:var(--pk);color:#fff}
/* CALORIE BURN SUMMARY */
.kcal-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:1rem}
.ks-box{background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:9px;text-align:center}
.ks-v{font-family:'Anton',sans-serif;font-size:18px;line-height:1;margin-bottom:2px}
.ks-l{font-size:9px;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase}
.ks-bar{margin-top:1rem;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:10px;margin-bottom:1rem}
.ks-bar-t{font-size:11px;color:var(--tx2);margin-bottom:6px;display:flex;justify-content:space-between}
.ks-bar-bg{background:var(--s3);border-radius:3px;height:8px;overflow:hidden}
.ks-bar-fill{height:100%;background:linear-gradient(90deg,var(--or),#ff7733);border-radius:3px;transition:width .5s ease}
/* EXERCISE CARDS */
.ex-list{display:flex;flex-direction:column;gap:7px}
.ex-card{background:var(--s1);border:1.5px solid var(--bd);border-radius:var(--r);padding:.9rem;display:flex;gap:.7rem;align-items:flex-start;transition:all .2s;cursor:default}
.ex-card:hover{border-color:rgba(255,85,0,.4)}
.ex-card.done{border-color:var(--gn);background:rgba(34,197,94,.06)}
.ex-num{font-family:'Anton',sans-serif;font-size:20px;color:var(--tx3);min-width:26px;line-height:1;padding-top:2px;transition:.2s}
.ex-card.done .ex-num{color:var(--gn)}
.ex-body{flex:1}
.ex-name{font-weight:600;font-size:14px;margin-bottom:2px}
.ex-muscle{font-size:11px;color:var(--tx2);margin-bottom:5px}
.ex-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.et{font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;padding:2px 6px;border-radius:3px}
.ts{background:var(--ord);color:var(--or)}.tr{background:var(--bld);color:var(--bl)}.td{background:rgba(255,255,255,.05);color:var(--tx3)}.tk{background:rgba(239,68,68,.12);color:#ff6b6b}
.ex-mod{font-size:11px;color:var(--tx2);border-left:2px solid var(--bd);padding-left:7px;margin-top:3px;line-height:1.5}
.ex-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.yt-btn{display:flex;align-items:center;gap:4px;background:rgba(255,0,0,.12);border:1px solid rgba(255,0,0,.3);border-radius:5px;padding:4px 8px;cursor:pointer;font-size:10px;color:#ff6b6b;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-decoration:none;transition:.2s}
.yt-btn:hover{background:rgba(255,0,0,.25);color:#fff}
.done-btn{display:flex;align-items:center;gap:4px;border:1.5px solid var(--bd);border-radius:5px;padding:4px 8px;cursor:pointer;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;background:none;color:var(--tx2);transition:.2s}
.done-btn:hover{border-color:var(--gn);color:var(--gn)}
.done-btn.marked{background:var(--gnd);border-color:var(--gn);color:var(--gn)}
.done-badge{display:inline-flex;align-items:center;gap:3px;background:var(--gnd);border:1px solid var(--gn);border-radius:3px;padding:2px 7px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--gn);letter-spacing:.5px}
/* SPECIAL CARDS */
.sp-card{background:var(--s1);border-radius:var(--r);padding:1.2rem;text-align:center;border:1px solid}
.cr{border-color:var(--gn)}.cw{border-color:var(--bl)}.cm{border-color:var(--yw)}
.sp-icon{font-size:36px;margin-bottom:.6rem}.sp-title{font-family:'Anton',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:.4rem}
.str-items{margin-top:.8rem;display:flex;flex-direction:column;gap:5px;text-align:left}
.str-item{background:var(--s2);border-radius:var(--rs);padding:7px 10px;font-size:12px;color:var(--tx2);border-left:3px solid var(--yw);display:flex;justify-content:space-between;align-items:center}
.str-item strong{color:var(--tx)}.str-dur{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;color:var(--yw)}
/* BIKE */
.bike-card{background:var(--s1);border:1px solid var(--bl);border-radius:var(--r);padding:1.1rem}
.bike-title{font-family:'Anton',sans-serif;font-size:20px;letter-spacing:2px;color:var(--bl);margin-bottom:.4rem}
.bike-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:.8rem 0}
.bst{background:var(--bld);border-radius:var(--rs);padding:8px;text-align:center}
.bst-v{font-family:'Anton',sans-serif;font-size:18px;color:var(--bl)}.bst-l{font-size:9px;color:var(--tx2);text-transform:uppercase}
.bike-phases{display:flex;flex-direction:column;gap:5px}
.bph{background:var(--s2);border-radius:var(--rs);padding:7px 10px;font-size:12px;color:var(--tx2);border-left:3px solid var(--bl)}
/* MEAL */
.meal-list{display:flex;flex-direction:column;gap:7px}
.meal-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.meal-hdr{display:flex;align-items:center;gap:7px;padding:8px 12px;background:var(--s2);border-bottom:1px solid var(--bd)}
.meal-ico{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ico-cafe{background:var(--ywd)}.ico-lm{background:var(--pud)}.ico-alm{background:var(--gnd)}.ico-pre{background:var(--ord)}.ico-pos{background:var(--bld)}.ico-jan{background:rgba(59,130,246,.1)}.ico-ln{background:rgba(34,197,94,.1)}.ico-ext{background:rgba(239,68,68,.15)}
.meal-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;flex:1}
.meal-time{font-size:10px;color:var(--tx2);background:var(--s3);padding:2px 6px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-weight:600}
.meal-body{padding:9px 12px}
.mi{font-size:12px;color:var(--tx2);display:flex;gap:5px;line-height:1.4;margin-bottom:3px}
.mi::before{content:'•';color:var(--tx3);flex-shrink:0}
.pt-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.ptl{font-size:10px;padding:2px 7px;border-radius:3px;background:var(--ord);color:var(--or);font-family:'Barlow Condensed',sans-serif;font-weight:600}
.ptj{font-size:10px;padding:2px 7px;border-radius:3px;background:var(--pkd);color:var(--pk);font-family:'Barlow Condensed',sans-serif;font-weight:600}
.meal-footer{padding:3px 12px 8px;display:flex;gap:6px;flex-wrap:wrap}
.rbtn{font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:3px;background:var(--gnd);color:var(--gn);border:1px solid rgba(34,197,94,.3);cursor:pointer;text-transform:uppercase;transition:.2s}
.rbtn:hover{background:rgba(34,197,94,.25)}
/* EXTERNAL MEAL */
.ext-zone{background:var(--s1);border:1.5px dashed var(--bd);border-radius:var(--r);padding:1rem;margin-top:.8rem}
.ext-zone-t{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx2);margin-bottom:.8rem;display:flex;justify-content:space-between;align-items:center}
.ext-inputs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:.7rem}
.ext-inp{background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:7px 10px;font-size:13px;color:var(--tx);font-family:'Barlow',sans-serif;flex:1;min-width:140px}
.ext-inp:focus{outline:none;border-color:var(--or)}
.ext-btn{background:var(--or);border:none;border-radius:var(--rs);padding:7px 14px;font-size:12px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;cursor:pointer;letter-spacing:.5px;white-space:nowrap}
.ext-btn:hover{background:#e84a00}
.ext-suggest{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.7rem}
.sug-btn{background:var(--s2);border:1px solid var(--bd);border-radius:4px;padding:3px 8px;font-size:11px;color:var(--tx2);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:600;transition:.2s}
.sug-btn:hover{border-color:var(--or);color:var(--or)}
.ext-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}
.ext-item{background:var(--s2);border-radius:var(--rs);padding:7px 10px;display:flex;justify-content:space-between;align-items:center;font-size:12px}
.ext-item-nm{color:var(--tx2)}.ext-item-k{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--or)}
.ext-del{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:0 3px}
.ext-del:hover{color:var(--rd)}
/* CALORIE TOTAL BAR */
.cal-bar-wrap{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;margin-top:.8rem}
.cal-bar-t{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx2);margin-bottom:.5rem}
.cal-person{margin-bottom:.7rem}
.cal-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.cal-name{color:var(--tx2)}.cal-nums{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px}
.cal-bg{background:var(--s3);border-radius:3px;height:10px;overflow:hidden}
.cal-fill{height:100%;border-radius:3px;transition:width .4s ease}
.cal-l-fill{background:linear-gradient(90deg,var(--or),#ff7733)}
.cal-j-fill{background:linear-gradient(90deg,var(--pk),#f472b6)}
/* PROFILE CARDS */
.prof-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1.2rem}
@media(max-width:560px){.prof-grid{grid-template-columns:1fr}}
.prof-card{background:var(--s1);border-radius:var(--r);padding:1rem;border:1.5px solid}
.pfl{border-color:var(--or)}.pfj{border-color:var(--pk)}
.pf-top{display:flex;align-items:center;gap:.7rem;margin-bottom:.7rem}
.pf-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:14px}
.avbl{background:var(--ord);color:var(--or)}.avbj{background:var(--pkd);color:var(--pk)}
.pf-name{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:1px}.pf-role{font-size:11px;color:var(--tx2)}
.pf-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.pf-st{background:var(--s2);border-radius:var(--rs);padding:6px;text-align:center}
.pf-st-v{font-weight:700;font-size:13px}.pf-st-l{font-size:9px;color:var(--tx3);text-transform:uppercase}
.pf-goal{margin-top:.7rem;font-size:12px;color:var(--tx2);background:var(--s2);border-radius:var(--rs);padding:7px 9px;border-left:3px solid}
.gll{border-color:var(--or)}.glj{border-color:var(--pk)}
/* SHOPPING */
.shop-cat{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:.8rem}
.shop-hdr{padding:9px 13px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:7px}
.shop-hdr-t{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;flex:1}
.shop-cnt{font-size:11px;color:var(--tx2);background:var(--s3);padding:2px 7px;border-radius:3px}
.shop-items{padding:10px 13px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:7px}
.si{background:var(--s2);border-radius:var(--rs);padding:8px 10px}
.si-n{font-size:13px;font-weight:600}.si-l{font-size:11px;color:var(--or)}.si-j{font-size:11px;color:var(--pk)}.si-o{font-size:10px;color:var(--tx3);font-style:italic;margin-top:2px}
/* RECIPE */
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.rcd{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:.9rem;cursor:pointer;transition:.2s}
.rcd:hover{border-color:var(--or);transform:translateY(-2px)}
.rcd-ico{font-size:26px;margin-bottom:.4rem}.rcd-nm{font-weight:600;font-size:13px;margin-bottom:2px}.rcd-cat{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px}.rcd-t{font-size:10px;color:var(--tx3);margin-top:.4rem}
/* PHYSIO */
.phy-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:.8rem}
.phy-hdr{padding:9px 13px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:7px}
.phy-ht{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase}
.phy-body{padding:11px 13px;display:flex;flex-direction:column;gap:8px}
.phy-tip{font-size:12px;color:var(--tx2);line-height:1.7;border-left:2px solid var(--bd);padding-left:7px}
.phy-tip strong{color:var(--tx)}
.phy-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(max-width:560px){.phy-grid{grid-template-columns:1fr}}
.pp-box{background:var(--s2);border-radius:var(--rs);padding:10px}
.pp-nm{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.pp-l{color:var(--or)}.pp-j{color:var(--pk)}
.pp-t{font-size:11px;color:var(--tx2);display:flex;gap:5px;line-height:1.5;margin-bottom:4px}
.pp-t::before{content:'→';color:var(--tx3);flex-shrink:0}
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(max-width:560px){.sig-grid{grid-template-columns:1fr}}
.sig{background:var(--s2);border-radius:var(--rs);padding:9px;font-size:11px;color:var(--tx2);border-left:3px solid}
.sg{border-color:var(--gn)}.sw{border-color:var(--rd)}

// STATE - Carregar do localStorage

let curDay=parseInt(localStorage.getItem('forte_day')||'0');

const completedExs=JSON.parse(localStorage.getItem('forte_completed')||'{}');
const extMeals=JSON.parse(localStorage.getItem('forte_meals')||'{}');

// Função para salvar estado no localStorage
function saveState(){
  localStorage.setItem('forte_completed',JSON.stringify(completedExs));
  localStorage.setItem('forte_meals',JSON.stringify(extMeals));
  localStorage.setItem('forte_tab',curTab);
  localStorage.setItem('forte_month',curMonth);
  localStorage.setItem('forte_week',curWeek);
  localStorage.setItem('forte_day',curDay);
}

function init(){
  renderMonths();renderWeeks();renderDays();
  document.querySelectorAll('.nav-tab').forEach((b,i)=>b.classList.toggle('active',['treino','nutricao','receitas','compras','fisio'][i]===curTab));
  document.getElementById('mstrip').style.display=(curTab==='treino'||curTab==='nutricao')?'block':'none';
  document.getElementById('wstrip').style.display=(curTab==='treino')?'flex':'none';
  renderContent();
}
function setTab(t){
  curTab=t;
  document.querySelectorAll('.nav-tab').forEach((b,i)=>b.classList.toggle('active',['treino','nutricao','receitas','compras','fisio'][i]===t));
  document.getElementById('mstrip').style.display=(t==='treino'||t==='nutricao')?'block':'none';
  document.getElementById('wstrip').style.display=(t==='treino')?'flex':'none';
  renderContent();
  saveState();
}
function renderMonths(){
  document.getElementById('mbtns').innerHTML=MONTHS.map((m,i)=>`<button class="mbtn ${i===curMonth?'active':''}" onclick="setMonth(${i})">${m.n}</button>`).join('');
}
function setMonth(i){curMonth=i;curWeek=0;renderMonths();renderWeeks();renderContent();saveState();}
function renderWeeks(){
  document.getElementById('wbtns').innerHTML=[0,1,2,3].map(i=>`<button class="wbtn ${i===curWeek?'active':''}" onclick="setWeek(${i})">Sem ${i+1}</button>`).join('');
  const m=MONTHS[curMonth];const c=document.getElementById('pchip');c.className=`pchip ${m.pcls}`;c.textContent=`${m.name} · ${m.ph} · ${m.season}`;
}
function setWeek(i){curWeek=i;renderWeeks();renderContent();saveState();}
function renderDays(){
  document.getElementById('dbtns').innerHTML=DA.map((d,i)=>`<button class="dbtn ${i===curDay?'active':''}" onclick="setDay(${i})"><span class="da">${d}</span><span class="dn">${i<6?'16h':'—'}</span></button>`).join('');
}
function setDay(i){curDay=i;renderDays();renderContent();saveState();}

function renderContent(){
  const el=document.getElementById('mainContent');
  el.className='main slide-in';
  if(curTab==='treino')el.innerHTML=renderTreino();
  else if(curTab==='nutricao')el.innerHTML=renderNutricao();
  else if(curTab==='receitas')el.innerHTML=renderReceitas();
  else if(curTab==='compras')el.innerHTML=renderCompras();
  else el.innerHTML=renderFisio();
}

// ── TREINO ──────────────────────────────────────────────────────────────────
function toggleEx(m,w,d,i){
  const k=exKey(m,w,d,i);
  completedExs[k]=!completedExs[k];
  renderContent();
  saveState();
}

function renderTreino(){
  const mo=MONTHS[curMonth];const day=PD[mo.level][curDay];const vol=WVOL[curWeek];
  const banner=`<div class="ph-banner"><div class="phb-icon">${mo.icon}</div>
    <div class="phb-info"><div class="phb-title">${mo.name.toUpperCase()} — ${mo.ph.toUpperCase()}</div>
    <div class="phb-desc">Semana ${curWeek+1}/4 · Nível ${['Iniciante','Básico','Intermediário','Avançado'][mo.level]}</div></div>
    <div class="phb-stats">
      <span class="phb-s">🕓 16:00</span>
      ${mo.hasBike?'<span class="phb-s">🚴 Bike</span>':''}
      <span class="phb-s">📅 Sem ${curWeek+1}</span>
      <span class="phb-s">${mo.season}</span>
    </div></div>`;
  
  const coverSrc=COVERS[day.cover]||COVERS.treino;
  const coverGrad=COVER_GRADS[day.cover]||COVER_GRADS.treino;
  
  let dayKcal=day.kcal||0;
  let exsDone=0,exsTotal=0;
  
  if(day.type==='treino'){
    exsTotal=day.exs.length;
    day.exs.forEach((_,i)=>{if(completedExs[exKey(curMonth,curWeek,curDay,i)])exsDone++;});
  }
  const progPct=exsTotal>0?Math.round(exsDone/exsTotal*100):0;
  const totalKcal=day.type==='treino'?day.exs.reduce((a,e)=>a+(e.kcal||0),0):dayKcal;
  const burnedKcal=exsTotal>0?Math.round(totalKcal*(exsDone/exsTotal)):0;

  const cover=`<div class="cover-wrap" style="background:${coverGrad}">
    <img class="cover-img" src="${coverSrc}" alt="treino" onerror="this.style.display='none'">
    <div class="cover-overlay"></div>
    <div class="cover-content">
      <div class="cover-title">${DL[curDay].toUpperCase()}</div>
      <div class="cover-sub">${day.focus||day.type.charAt(0).toUpperCase()+day.type.slice(1)} · ${mo.name}</div>
      <div class="cover-tags">
        <span class="ctag ct-or">${mo.ph}</span>
        ${day.type==='bike'?'<span class="ctag ct-bl">Bicicleta</span>':''}
        ${day.type==='descanso'?'<span class="ctag ct-gn">Descanso</span>':''}
        ${day.type==='mobilidade'?'<span class="ctag ct-yw">Mobilidade</span>':''}
        ${totalKcal>0?`<span class="ctag ct-pk">🔥 ~${totalKcal} kcal</span>`:''}
      </div>
    </div>
    ${exsTotal>0?`<div class="prog-ring"><div class="pr-v">${progPct}%</div><div class="pr-l">feito</div></div>`:''}
  </div>`;

  let content='';
  if(day.type==='treino'){
    const kcalSummary=`<div class="kcal-summary">
      <div class="ks-box"><div class="ks-v" style="color:var(--or)">${day.exs.length}</div><div class="ks-l">Exercícios</div></div>
      <div class="ks-box"><div class="ks-v" style="color:var(--rd)">~${totalKcal}</div><div class="ks-l">kcal total</div></div>
      <div class="ks-box"><div class="ks-v" style="color:var(--gn)">${burnedKcal}</div><div class="ks-l">kcal queimadas</div></div>
      <div class="ks-box"><div class="ks-v" style="color:var(--yw)">${exsDone}/${exsTotal}</div><div class="ks-l">Concluídos</div></div>
    </div>`;
    const progBar=exsTotal>0?`<div class="ks-bar">
      <div class="ks-bar-t"><span>Progresso do treino</span><span style="color:var(--gn)">${burnedKcal} kcal queimadas</span></div>
      <div class="ks-bar-bg"><div class="ks-bar-fill" style="width:${progPct}%"></div></div>
    </div>`:'';
    const exCards=day.exs.map((e,i)=>{
      const k=exKey(curMonth,curWeek,curDay,i);const done=completedExs[k];
      const adjS=e.s>1?Math.max(2,Math.round(e.s*vol)):e.s;
      return `<div class="ex-card ${done?'done':''}">
        <div class="ex-num">${done?'✓':String(i+1).padStart(2,'0')}</div>
        <div class="ex-body">
          <div class="ex-name">${e.n}</div>
          <div class="ex-muscle">${e.m}</div>
          <div class="ex-tags">
            ${e.s>0?`<span class="et ts">${adjS} série${adjS>1?'s':''}</span>`:''}
            <span class="et tr">${e.r}</span>
            ${e.rest!=='—'?`<span class="et td">⏱ ${e.rest}</span>`:''}
            <span class="et tk">🔥 ~${e.kcal} kcal</span>
          </div>
          <div class="ex-mod">💡 ${e.mod}</div>
        </div>
        <div class="ex-right">
          <a class="yt-btn" href="${e.yt}" target="_blank">▶ YT</a>
          <button class="done-btn ${done?'marked':''}" onclick="toggleEx(${curMonth},${curWeek},${curDay},${i})">
            ${done?'✅ FEITO':'⬜ MARCAR'}
          </button>
        </div>
      </div>`;
    }).join('');
    content=kcalSummary+progBar+`<div class="slbl">Exercícios</div><div class="ex-list">${exCards}</div>
    <div class="tip-box"><div class="tip-box-t">💡 DICA DO DIA</div><div class="tip-box-c">${day.tip}</div></div>
    ${exsDone===exsTotal&&exsTotal>0?`<div style="background:var(--gnd);border:1px solid var(--gn);border-radius:var(--r);padding:1rem;margin-top:.8rem;text-align:center">
      <div style="font-family:'Anton',sans-serif;font-size:22px;color:var(--gn);letter-spacing:2px">🎉 TREINO CONCLUÍDO!</div>
      <div style="font-size:13px;color:var(--tx2);margin-top:4px">Você queimou ~${totalKcal} kcal! Tome o pós-treino agora (17:00).</div>
    </div>`:''}`;
  } else if(day.type==='bike'){
    const adjDist=mo.hasBike?day.dist:'20 min (Bike disponível a partir de Fevereiro)';
    content=`<div class="bike-card">
      <div style="font-size:28px;margin-bottom:.5rem">🚴</div>
      <div class="bike-title">BICICLETA — ${day.zona}</div>
      <div style="font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:.8rem">${day.tip}</div>
      <div class="bike-grid">
        <div class="bst"><div class="bst-v">${adjDist}</div><div class="bst-l">Duração</div></div>
        <div class="bst"><div class="bst-v">~${dayKcal}</div><div class="bst-l">kcal queimadas</div></div>
        <div class="bst"><div class="bst-v">${day.zona.split(' ')[0]}</div><div class="bst-l">Zona</div></div>
      </div>
      <div class="slbl" style="margin-top:.8rem">Estrutura do Treino</div>
      <div class="bike-phases">${day.phases.map(p=>`<div class="bph">${p}</div>`).join('')}</div>
      <a href="${YTB('ciclismo indoor treino bike playlist')}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;margin-top:.8rem;background:rgba(255,0,0,.12);border:1px solid rgba(255,0,0,.3);border-radius:5px;padding:6px 11px;font-size:11px;color:#ff6b6b;text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-weight:700">▶ Músicas para pedalar</a>
    </div>
    ${!mo.hasBike?`<div class="tip-box"><div class="tip-box-t">ℹ️ BIKE A PARTIR DE FEVEREIRO</div><div class="tip-box-c">Em Janeiro este dia é caminhada de 20-25 min. Bicicleta entra no programa a partir de Fevereiro!</div></div>`:''}`;
  } else if(day.type==='caminhada'){
    content=`<div class="sp-card cw">
      <div class="sp-icon">🚶</div><div class="sp-title" style="color:var(--bl)">CAMINHADA ATIVA</div>
      <div style="font-size:13px;color:var(--tx2);line-height:1.6">${day.tip}</div>
      <div style="margin-top:.9rem;display:grid;grid-template-columns:1fr 1fr;gap:7px">
        <div style="background:var(--bld);border-radius:var(--rs);padding:9px;text-align:center"><div style="font-family:'Anton',sans-serif;font-size:18px;color:var(--bl)">${day.dist}</div><div style="font-size:9px;color:var(--tx2);text-transform:uppercase">Duração</div></div>
        <div style="background:var(--bld);border-radius:var(--rs);padding:9px;text-align:center"><div style="font-family:'Anton',sans-serif;font-size:18px;color:var(--bl)">~${dayKcal} kcal</div><div style="font-size:9px;color:var(--tx2);text-transform:uppercase">Queima</div></div>
      </div>
    </div>`;
  } else if(day.type==='mobilidade'){
    content=`<div class="sp-card cm">
      <div class="sp-icon">🧘</div><div class="sp-title" style="color:var(--yw)">MOBILIDADE & FLEXIBILIDADE</div>
      <div style="font-size:13px;color:var(--tx2)">Sessão de ${day.dist||'20-25 min'}. Músculos precisam disso para crescer!</div>
      <div class="str-items">${(day.stretches||[]).map(s=>`<div class="str-item"><strong>${s.n}</strong><span class="str-dur">${s.dur}</span></div>`).join('')}</div>
    </div>`;
  } else {
    content=`<div class="sp-card cr">
      <div class="sp-icon">💤</div><div class="sp-title" style="color:var(--gn)">DESCANSO TOTAL</div>
      <div style="font-size:13px;color:var(--tx2);line-height:1.6">${day.msg}</div>
      <div style="margin-top:.9rem;display:flex;flex-direction:column;gap:5px;text-align:left">
        ${['🌊 Beba 2,5-3L de água','😴 Durma 7-8 horas','🍽 Mantenha a alimentação','💆 Automassagem c/ óleo de coco','🫁 Respire fundo — gerencie o estresse'].map(t=>`<div style="background:var(--gnd);border-radius:var(--rs);padding:7px 10px;font-size:12px;color:var(--tx2);border-left:3px solid var(--gn)">${t}</div>`).join('')}
      </div>
    </div>`;
  }
  return banner+cover+content;
}

// ── NUTRIÇÃO ─────────────────────────────────────────────────────────────────
function addExtMeal(){
  const nm=document.getElementById('extNm').value.trim();
  const kc=parseInt(document.getElementById('extKc').value)||0;
  if(!nm||!kc)return;
  const k=extKey(curDay);
  if(!extMeals[k])extMeals[k]=[];
  extMeals[k].push({n:nm,k:kc,id:Date.now()});
  document.getElementById('extNm').value='';document.getElementById('extKc').value='';
  renderContent();
  saveState();
}
function delExtMeal(id){
  const k=extKey(curDay);
  if(extMeals[k])extMeals[k]=extMeals[k].filter(m=>m.id!==id);
  renderContent();
  saveState();
}
function sugFood(n,k){
  document.getElementById('extNm').value=n;document.getElementById('extKc').value=k;
}

function renderNutricao(){
  const meals=YEAR_MEALS[curMonth][curDay];const sk=extKey(curDay);const ext=extMeals[sk]||[];
  const extTotalKcal=ext.reduce((a,m)=>a+m.k,0);
  const mealKcalL=1880+extTotalKcal;const mealKcalJ=1480+extTotalKcal;
  const targetL=2200;const targetJ=1700;
  const pctL=Math.min(100,Math.round(mealKcalL/targetL*100));const pctJ=Math.min(100,Math.round(mealKcalJ/targetJ*100));
  const profCards=`<div class="prof-grid">
    <div class="prof-card pfl">
      <div class="pf-top"><div class="pf-av avbl">LL</div><div><div class="pf-name">LUANTHONY</div><div class="pf-role">40 anos · 1,89m · 100kg</div></div></div>
      <div class="pf-stats">
        <div class="pf-st"><div class="pf-st-v" style="color:var(--or)">~2.200</div><div class="pf-st-l">kcal meta</div></div>
        <div class="pf-st"><div class="pf-st-v" style="color:var(--or)">~155g</div><div class="pf-st-l">proteína</div></div>
        <div class="pf-st"><div class="pf-st-v" style="color:var(--or)">28,0</div><div class="pf-st-l">IMC</div></div>
      </div>
      <div class="pf-goal gll">🎯 −500 kcal/dia = −2kg/mês com saúde</div>
    </div>
    <div class="prof-card pfj">
      <div class="pf-top"><div class="pf-av avbj">JO</div><div><div class="pf-name">JÉSSICA</div><div class="pf-role">31 anos · 1,56m · 74kg</div></div></div>
      <div class="pf-stats">
        <div class="pf-st"><div class="pf-st-v" style="color:var(--pk)">~1.700</div><div class="pf-st-l">kcal meta</div></div>
        <div class="pf-st"><div class="pf-st-v" style="color:var(--pk)">~110g</div><div class="pf-st-l">proteína</div></div>
        <div class="pf-st"><div class="pf-st-v" style="color:var(--pk)">30,4</div><div class="pf-st-l">IMC</div></div>
      </div>
      <div class="pf-goal glj">🎯 −400 kcal/dia = −1,5kg/mês com saúde</div>
    </div>
  </div>`;
  const mOrder=['cafe','lanche_m','almoco','pre','pos','jantar','lanche_n'];
  const mCards=mOrder.map(k=>{const m=meals[k];return `<div class="meal-card">
    <div class="meal-hdr"><div class="meal-ico ${m.icoCls}">${m.ico}</div><div class="meal-title">${m.t}</div><div class="meal-time">${m.time}</div></div>
    <div class="meal-body">${m.items.map(it=>`<div class="mi">${it}</div>`).join('')}
    <div class="pt-row"><span class="ptl">Luanthony: ${m.ptl}</span><span class="ptj">Jéssica: ${m.ptj}</span></div></div>
    <div class="meal-footer">${m.rec?`<button class="rbtn" onclick="openRec('${m.rec}')">📖 Receita</button>`:''}</div>
  </div>`;}).join('');
  
  const extList=ext.length>0?`<div class="ext-list">${ext.map(m=>`
    <div class="ext-item"><span class="ext-item-nm">${m.n}</span><div style="display:flex;align-items:center;gap:8px"><span class="ext-item-k">${m.k} kcal</span><button class="ext-del" onclick="delExtMeal(${m.id})">✕</button></div></div>
  `).join('')}</div>`:'<div style="font-size:12px;color:var(--tx3);text-align:center;padding:.5rem">Nenhuma refeição externa adicionada hoje.</div>';
  
  const calBar=`<div class="cal-bar-wrap">
    <div class="cal-bar-t">📊 CALORIAS DO DIA ${ext.length>0?`(incluindo ${ext.length} refeição${ext.length>1?'s':''} externa${ext.length>1?'s':''})`:''}</div>
    <div class="cal-person">
      <div class="cal-label"><span class="cal-name">Luanthony</span><span class="cal-nums" style="color:var(--or)">${mealKcalL} / ${targetL} kcal (${pctL}%)</span></div>
      <div class="cal-bg"><div class="cal-fill cal-l-fill" style="width:${pctL}%"></div></div>
    </div>
    <div class="cal-person" style="margin-bottom:0">
      <div class="cal-label"><span class="cal-name">Jéssica</span><span class="cal-nums" style="color:var(--pk)">${mealKcalJ} / ${targetJ} kcal (${pctJ}%)</span></div>
      <div class="cal-bg"><div class="cal-fill cal-j-fill" style="width:${pctJ}%"></div></div>
    </div>
    ${pctL>105||pctJ>105?`<div style="font-size:11px;color:var(--rd);margin-top:6px">⚠️ Atenção: calorias acima da meta diária com a refeição externa.</div>`:''}
  </div>`;
  
  const extZone=`<div class="ext-zone">
    <div class="ext-zone-t">
      <span>➕ Refeição Feita por Fora</span>
      ${ext.length>0?`<span style="color:var(--or);font-size:11px">+${extTotalKcal} kcal</span>`:''}
    </div>
    <div style="font-size:12px;color:var(--tx2);margin-bottom:.8rem">Comeu algo fora do plano? Adicione aqui para calcular as calorias do dia.</div>
    <div class="ext-suggest">
      <div style="font-size:10px;color:var(--tx3);width:100%;margin-bottom:3px">SUGESTÕES RÁPIDAS:</div>
      ${FOODS.slice(0,12).map(f=>`<button class="sug-btn" onclick="sugFood('${f.n}',${f.k})">${f.n} · ${f.k}kcal</button>`).join('')}
    </div>
    <div class="ext-inputs">
      <input id="extNm" class="ext-inp" placeholder="Nome do alimento/refeição" />
      <input id="extKc" class="ext-inp" type="number" placeholder="Calorias (kcal)" style="max-width:160px" />
    </div>
    <button class="ext-btn" onclick="addExtMeal()">+ Adicionar ao Dia</button>
    <div style="margin-top:.8rem">${extList}</div>
  </div>`;
  
  return `${profCards}<div class="slbl">${DL[curDay]} — Cardápio Completo (7 refeições)</div>
  <div style="background:var(--ord);border:1px solid var(--or);border-radius:var(--rs);padding:6px 10px;margin-bottom:.8rem;font-size:12px;color:var(--tx2)">
    ⚡ Treino às <strong style="color:var(--or)">16:00</strong> · Pré 15:00 · Pós 17:00 · Lanche noite 21:30
  </div>
  <div class="meal-list">${mCards}</div>
  ${calBar}${extZone}`;
}

// ── COMPRAS ─────────────────────────────────────────────────────────────────

  const se=SHOP_SEASONAL[shopMonth];const m=MONTHS[shopMonth];
  const monthTabs=MONTHS.map((mo,i)=>`<button class="mtab ${i===shopMonth?'active':''}" onclick="setShopMonth(${i})">${mo.n}</button>`).join('');
  const baseShop=SHOP_BASE.map(c=>`<div class="shop-cat">

    <div class="shop-items">${c.items.map(it=>`<div class="si"><div class="si-n">${it.n}</div><div class="si-l">🟠 Luanthony: ${it.ql}</div><div class="si-j">🩷 Jéssica: ${it.qj}</div>${it.obs?`<div class="si-o">${it.obs}</div>`:''}</div>`).join('')}</div>
  </div>`).join('');
  const seaShop=`<div class="shop-cat" style="border:1.5px solid var(--or)">
    <div class="shop-hdr" style="background:var(--ord)"><span>🗓</span><span class="shop-hdr-t" style="color:var(--or)">${se.cat} — Sazonais de ${m.name}</span><span class="shop-cnt">${se.items.length} itens</span></div>
    <div class="shop-items">${se.items.map(it=>`<div class="si" style="border:1px solid var(--bd)"><div class="si-n">${it.n}</div><div class="si-l">🟠 Luanthony: ${it.ql}</div><div class="si-j">🩷 Jéssica: ${it.qj}</div>${it.obs?`<div class="si-o">${it.obs}</div>`:''}</div>`).join('')}</div>
  </div>`;
  return `<div style="margin-bottom:.9rem">
    <div style="font-family:'Anton',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:3px">LISTA DE COMPRAS ANUAL</div>
    <div style="font-size:12px;color:var(--tx2)">Selecione o mês para ver os alimentos sazonais. Base semanal + sazonais da Bahia.</div>
  </div>
  <div style="font-size:12px;color:var(--tx2);margin-bottom:.6rem">📅 Selecione o mês:</div>
  <div class="month-tabs">${monthTabs}</div>
  <div style="background:var(--ord);border:1px solid var(--or);border-radius:var(--r);padding:.8rem;margin-bottom:.9rem">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;color:var(--or);margin-bottom:5px">💡 DICA ECONÔMICA — ${m.name.toUpperCase()} (${m.season})</div>
    <div style="font-size:12px;color:var(--tx2);line-height:1.7">Feira livre > supermercado para frutas, verduras e peixes. Este mês: <strong style="color:var(--or)">${m.season}</strong> está em safra na Bahia! Priorize estes produtos — mais baratos, mais nutritivos e mais frescos.</div>
  </div>
  ${seaShop}${baseShop}
  <div style="background:var(--gnd);border:1px solid var(--gn);border-radius:var(--r);padding:.9rem;margin-top:.5rem">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;color:var(--gn);margin-bottom:7px">✅ DICAS DE COMPRAS NORDESTINAS</div>
    ${['Feira livre > supermercado para peixes, frutas e verduras','Sardinha fresca da Bahia substitui o atum com vantagem','Feijão de corda = feijão nordestino mais leve e proteico','Cuscuz: fubá a granel na feira é mais barato','Mel de abelha nativa (tiúba, uruçu) — produto regional excelente','Queijo de coalho nordestino = proteína + sabor baiano','Congele frango em porções de 150-200g para a semana','Compre hortifruti na segunda-feira (mais fresco pós-fim de semana)'].map(t=>`<div style="font-size:12px;color:var(--tx2);display:flex;gap:5px;margin-bottom:3px"><span style="color:var(--gn)">✓</span>${t}</div>`).join('')}
  </div>`;
}
function setShopMonth(i){shopMonth=i;renderContent();}

// ── FISIO ────────────────────────────────────────────────────────────────────
function renderFisio(){
  return `<div style="margin-bottom:.9rem">
    <div style="font-family:'Anton',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:3px">FISIOTERAPIA & RECUPERAÇÃO</div>
    <div style="font-size:12px;color:var(--tx2)">Orientações personalizadas para 1 ano de evolução segura.</div>
  </div>
  <div class="phy-card"><div class="phy-hdr"><span>👨‍⚕️</span><span class="phy-ht">Avaliação do Casal</span></div>
  <div class="phy-body"><div class="phy-tip">Para iniciantes absolutos, o maior risco não é a intensidade — é a pressa. Os primeiros 30 dias são de adaptação neuromuscular. Respeitar esse processo previne 90% das lesões.</div>
  <div class="phy-grid">
    <div class="pp-box"><div class="pp-nm pp-l">Luanthony — 40 anos · 100kg</div>
      <div class="pp-t">100kg = carga articular elevada. Atenção redobrada nos joelhos no agachamento.</div>
      <div class="pp-t">Aos 40 anos, a recuperação é 20-30% mais lenta. Domingo de descanso é sagrado.</div>
      <div class="pp-t">Apneia do sono é comum com sobrepeso. Melhor sono = melhor recuperação.</div>
      <div class="pp-t">Se dor no joelho: reduza amplitude para meia-amplitude até fortalecer o quadríceps.</div>
    </div>
    <div class="pp-box"><div class="pp-nm pp-j">Jéssica — 31 anos · 74kg</div>
      <div class="pp-t">Quadril feminino mais largo → joelhos tendem a cair para dentro no agachamento. Empurre para fora!</div>
      <div class="pp-t">Fase pré-menstrual pode reduzir desempenho. Reduza intensidade nessa semana sem culpa.</div>
      <div class="pp-t">Ombros mais hipermóveis → cuidado com excesso de amplitude.</div>
      <div class="pp-t">Panturrilhas mais tensas: inclua alongamento de calcanhar SEMPRE após dia de perna.</div>
    </div>
  </div></div></div>
  <div class="phy-card"><div class="phy-hdr"><span>🚴</span><span class="phy-ht">Orientações para Bicicleta</span></div>
  <div class="phy-body">
    <div class="phy-tip"><strong>Selim:</strong> perna quase estendida no ponto mais baixo do pedal. Selim baixo sobrecarrega o joelho.</div>
    <div class="phy-tip"><strong>Postura:</strong> costas levemente inclinadas, cotovelos suavemente dobrados. Não "pendurar" nos punhos.</div>
    <div class="phy-tip"><strong>Progressão:</strong> nunca aumente mais de 10 min por semana. De 20 a 90 min em 1 ano é progressão excelente.</div>
    <div class="phy-tip"><strong>Dor no joelho na bike:</strong> quase sempre é selim baixo. Ajuste 1-2cm para cima.</div>
    <div class="phy-tip"><strong>Luanthony:</strong> resistência baixa nas primeiras 4 semanas. Aumente gradualmente.</div>
  </div></div>
  <div class="phy-card"><div class="phy-hdr"><span>❤️</span><span class="phy-ht">Recuperação + Clima Baiano</span></div>
  <div class="phy-body">
    <div class="phy-tip"><strong>Após o treino:</strong> 5-10 min de caminhada leve. Nunca pare de golpe — tontura e dificuldade de recuperação cardíaca.</div>
    <div class="phy-tip"><strong>Calor baiano:</strong> hidrate-se 30 min ANTES de treinar. Calor + desidratação = risco de cãibras. Água de coco = isotônico perfeito!</div>
    <div class="phy-tip"><strong>DOMS:</strong> dor muscular no dia seguinte é NORMAL nas semanas 1-2. Dor articular (joelho, ombro) é diferente — exige atenção.</div>
    <div class="phy-tip"><strong>Auto-massagem:</strong> garrafa de água gelada na coxa 3 min após dia de perna. Simples e eficaz.</div>
    <div class="phy-tip"><strong>Sono:</strong> 7-9 horas. 80% do hormônio de crescimento é liberado durante o sono profundo. Treino às 16h → corpo esfria → sono melhorado.</div>
  </div></div>
  <div class="phy-card"><div class="phy-hdr"><span>⚠️</span><span class="phy-ht">Sinais de Alerta</span></div>
  <div class="phy-body"><div class="sig-grid">
    <div class="sig sg"><strong>✓ NORMAL — Continue</strong>Queimação muscular, DOMS, cansaço leve, suor, fôlego curto, dificuldade para sentar no banheiro.</div>
    <div class="sig sw"><strong>✕ ALERTA — Pare</strong>Dor articular durante movimento, lombar, tontura, enjoo, formigamento nos membros.</div>
    <div class="sig sg"><strong>✓ ESPERADO Sem 1-2</strong>Braços/pernas pesados, sono mais profundo, mais apetite, inchaço leve nas pernas.</div>
    <div class="sig sw"><strong>✕ MÉDICO — Urgente</strong>Dor no peito, palpitações fortes, dor irradiando para braço esquerdo, pressão alta piorando.</div>
  </div></div></div>
  <div class="phy-card"><div class="phy-hdr"><span>📈</span><span class="phy-ht">Evolução Segura — 12 Meses</span></div>
  <div class="phy-body">
    ${MONTHS.map((m,i)=>`<div style="background:var(--s2);border-radius:var(--rs);padding:8px;border-left:3px solid ${['var(--gn)','var(--gn)','var(--yw)','var(--yw)','var(--or)','var(--or)','var(--rd)','var(--rd)','var(--rd)','var(--pu)','var(--pu)','var(--pu)'][i]};margin-bottom:5px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;color:${['var(--gn)','var(--gn)','var(--yw)','var(--yw)','var(--or)','var(--or)','var(--rd)','var(--rd)','var(--rd)','var(--pu)','var(--pu)','var(--pu)'][i]}">${m.icon} ${m.name} — ${m.ph}</div>
      <div style="font-size:11px;color:var(--tx2)">Nível ${['Iniciante','Iniciante','Básico Inicial','Básico','Básico Avançado','Intermediário Inicial','Intermediário','Intermediário Avançado','Avançado Inicial','Avançado','Avançado Forte','Elite'][i]} · ${m.season}</div>
    </div>`).join('')}
    <div class="phy-tip" style="margin-top:.5rem"><strong>Regra de ouro:</strong> Nunca aumente mais de 10% do volume por semana. Este plano segue exatamente essa progressão. Em 12 meses vocês estarão num nível que poucos alcançam!</div>
  </div></div>`;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openRec(id){
  const r=RECIPES[id];if(!r)return;
  document.getElementById('recContent').innerHTML=`
    <div style="font-size:24px;margin-bottom:.4rem">${r.ico}</div>
    <div class="rec-title">${r.nome.toUpperCase()}</div>
    <div class="rec-desc">${r.desc}</div>
    <div class="rec-sec"><div class="rec-sec-t">Ingredientes</div>
      ${r.ings.map(i=>`<div class="ing-row"><span class="ing-nm">${i.n}</span><span class="ing-amt">${i.a}</span></div>`).join('')}
      ${r.porcao?`<div class="por-row"><span class="ptl">🟠 ${r.porcao.l}</span><span class="ptj">🩷 ${r.porcao.j}</span></div>`:''}
    </div>
    <div class="rec-sec"><div class="rec-sec-t">Modo de Preparo</div>
      ${r.steps.map((s,i)=>`<div class="step"><div class="sn">${i+1}</div><div class="st">${s}</div></div>`).join('')}
    </div>
    ${r.tip?`<div class="rec-tip-box"><strong>Dica:</strong> ${r.tip}</div>`:''}
  `;
  document.getElementById('recModal').classList.remove('hidden');
}
function closeRec(){document.getElementById('recModal').classList.add('hidden');}
document.getElementById('recModal').addEventListener('click',function(e){if(e.target===this)closeRec();});

init();

// Service Worker para PWA offline
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(err=>console.log('SW registration failed:',err));
}
</script>
